apiVersion: v1
kind: Namespace
metadata:
  name: qwen3-5-test
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hyperdisk-balanced-qwen3-5
provisioner: pd.csi.storage.gke.io
parameters:
  type: hyperdisk-balanced
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hd-claim-qwen3-5
  namespace: qwen3-5-test
spec:
  storageClassName: hyperdisk-balanced-qwen3-5
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1500Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-5
  namespace: qwen3-5-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen3-5
  template:
    metadata:
      labels:
        app: vllm-qwen3-5
    spec:
      nodeSelector:
        cloud.google.com/gke-tpu-accelerator: tpu7x
        cloud.google.com/gke-tpu-topology: 2x2x1
      containers:
      - name: vllm-tpu
        image: vllm/vllm-tpu:nightly-20260616-df47e95-a30addc
        command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
        args:
        - --host=0.0.0.0
        - --port=8000
        - --seed=42
        - --model=Qwen/Qwen3.5-397B-A17B-FP8
        - --tensor-parallel-size=8
        - --kv-cache-dtype=fp8
        - --max-model-len=9216
        - --gpu-memory-utilization=0.9
        - --max-num-seqs=64
        - --max-num-batched-tokens=1024
        - --no-enable-prefix-caching
        - --enable-expert-parallel
        - --async-scheduling
        - --language-model-only
        - --enable-auto-tool-choice
        - --tool-call-parser=qwen3_coder
        - --reasoning-parser=qwen3
        - '--limit-mm-per-prompt={"image": 0, "video": 0}'
        - --mamba-ssm-cache-dtype=bfloat16
        - '--additional-config={"sharding": {"sharding_strategy": {"enable_dp_attention": true}}}'
        env:
        - name: USE_MOE_EP_KERNEL
          value: "0"
        - name: MODEL_IMPL_TYPE
          value: "vllm"
        - name: ATTN_BUCKETIZED_NUM_REQS
          value: "true"
        - name: ATTN_CUSTOM_NUM_REQS_BUCKETS
          value: "8,16,32,64"
        - name: RAGGED_GATED_DELTA_RULE_IMPL
          value: "chunked_kernel_p_recurrent_kernel_d"
        - name: ONEHOT_MOE_PERMUTE_THRESHOLD
          value: "32768"
        - name: NEW_MODEL_DESIGN
          value: "1"
        - name: HF_HOME
          value: /data
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-secret
              key: hf_api_token
        ports:
        - containerPort: 8000
        resources:
          limits:
            google.com/tpu: '4'
          requests:
            google.com/tpu: '4'
        readinessProbe:
          tcpSocket:
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - mountPath: "/data"
          name: data-volume
        - mountPath: /dev/shm
          name: dshm
      volumes:
      - emptyDir:
          medium: Memory
        name: dshm
      - name: data-volume
        persistentVolumeClaim:
          claimName: hd-claim-qwen3-5
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen3-5-service
  namespace: qwen3-5-test
spec:
  selector:
    app: vllm-qwen3-5
  type: ClusterIP
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000
