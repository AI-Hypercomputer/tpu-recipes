apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: hyperdisk-balanced-tpu
provisioner: pd.csi.storage.gke.io
parameters:
  type: hyperdisk-balanced
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hd-claim
spec:
  storageClassName: hyperdisk-balanced-tpu
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1500Gi
---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: vllm-tpu-server
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          role: leader
          app: vllm-tpu-pod
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 2x2x1
        tolerations:
        - key: "google.com/tpu"
          operator: "Exists"
        containers:
        - name: vllm-leader
          image: vllm/vllm-tpu:nightly-20260616-df47e95-a30addc
          imagePullPolicy: IfNotPresent
          env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: hf_api_token
          - name: TPU_MULTIHOST_BACKEND
            value: ray
          - name: JAX_PLATFORMS
            value: ""
          - name: MODEL_IMPL_TYPE
            value: vllm
          command: ["/bin/bash", "-c"]
          args:
          - |
            USE_MOE_EP_KERNEL=0 MODEL_IMPL_TYPE=vllm ATTN_BUCKETIZED_NUM_REQS=true ATTN_CUSTOM_NUM_REQS_BUCKETS=8,16,32,64 RAGGED_GATED_DELTA_RULE_IMPL=chunked_kernel_p_recurrent_kernel_d ONEHOT_MOE_PERMUTE_THRESHOLD=32768 NEW_MODEL_DESIGN=1 VLLM_TORCH_COMPILE_CACHE_DIR=/data/torch_compile_cache XLA_CACHE_DIR=/data/xla_cache python3 -m vllm.entrypoints.openai.api_server \
            --host=0.0.0.0 \
            --port=8000 \
            --download-dir=/data \
            --additional_config='{"sharding": {"sharding_strategy": {"enable_dp_attention": true}}}' \
            --kv-cache-dtype=fp8 \
            --max-model-len=9216 \
            --gpu-memory-utilization=0.9 \
            --tensor-parallel-size=8 \
            --max-num-seqs=64 \
            --max-num-batched-tokens=1024 \
            --no-enable-prefix-caching \
            --enable-expert-parallel \
            --language-model-only \
            --enable-auto-tool-choice \
            --tool-call-parser=qwen3_coder \
            --reasoning-parser=qwen3 \
            --limit-mm-per-prompt='{"image": 0, "video": 0}' \
            --mamba-ssm-cache-dtype=bfloat16 \
            --block-size=256 \
            --model=Qwen/Qwen3.5-397B-A17B-FP8 \
            --tokenizer=Qwen/Qwen3.5-397B-A17B-FP8 \
            --trust-remote-code
          resources:
            limits:
              google.com/tpu: "4"
              ephemeral-storage: "150Gi"
            requests:
              google.com/tpu: "4"
              ephemeral-storage: "150Gi"
          ports:
          - containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /data
            name: data-volume
        volumes:
        - emptyDir:
            medium: Memory
          name: dshm
        - name: data-volume
          persistentVolumeClaim:
            claimName: hd-claim
    workerTemplate:
      spec:
        nodeSelector:
          cloud.google.com/gke-tpu-accelerator: tpu7x
          cloud.google.com/gke-tpu-topology: 2x2x1
        tolerations:
        - key: "google.com/tpu"
          operator: "Exists"
        containers:
        - name: vllm-worker
          image: vllm/vllm-tpu:nightly-20260616-df47e95-a30addc
          command: ["/bin/bash", "-c"]
          args:
          - "sleep infinity"
          resources:
            limits:
              google.com/tpu: "4"
              ephemeral-storage: "150Gi"
            requests:
              google.com/tpu: "4"
              ephemeral-storage: "150Gi"
          env:
          - name: HUGGING_FACE_HUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: hf-secret
                key: hf_api_token
          - name: TPU_MULTIHOST_BACKEND
            value: ray
          - name: JAX_PLATFORMS
            value: ""
          volumeMounts:
          - mountPath: /dev/shm
            name: dshm
          - mountPath: /data
            name: data-volume
        volumes:
        - emptyDir:
            medium: Memory
          name: dshm
        - name: data-volume
          persistentVolumeClaim:
            claimName: hd-claim
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
spec:
  selector:
    app: vllm-tpu-pod
    role: leader
  type: LoadBalancer
  ports:
  - name: http
    protocol: TCP
    port: 8000
    targetPort: 8000
