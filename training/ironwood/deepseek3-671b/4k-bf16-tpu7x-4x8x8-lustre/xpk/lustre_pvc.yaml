apiVersion: v1
kind: PersistentVolume
metadata:
  name: lustre-pv
spec:
  storageClassName: ""
  capacity:
    storage: 774000Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  volumeMode: Filesystem
  claimRef:
    namespace: default
    name: lustre-volume
  csi:
    driver: lustre.csi.storage.gke.io
    volumeHandle: "cloud-tpu-multipod-dev/us-central1-c/lustre-next"
    # volumeHandle: "<PROJECT>/<ZONE>/<LUSTRE INSTANCE NAME>"
    volumeAttributes:
      ip: "10.157.144.17"    # From mountPoint
      filesystem: "nextfs"      # From filesystem
      # ip: <INSTANCE IP>
      # filesystem: <FILE SYSTEM NAME>
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lustre-volume
  namespace: default
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 774000Gi
  volumeName: lustre-pv
  storageClassName: ""